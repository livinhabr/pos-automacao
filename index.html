                      <div className="w-full max-w-xs">
                        <div className="mb-2 flex justify-between text-xs font-medium text-slate-500">
                          <span>Progresso do cadastro</span>
                          <span>{Math.round(((currentStep + 1) / steps.length) * 100)}%</span>
                        </div>
                        <div className="h-2 rounded-full bg-slate-100">
                          <div className="h-2 rounded-full bg-gradient-to-r from-seeBlue to-seeGreen transition-all" style={{ width: `${((currentStep + 1) / steps.length) * 100}%` }} />
                        </div>
                      </div>
                    </div>

                    <div className="mt-8 grid gap-5 md:grid-cols-2">
                      {current.fields.map((field) => (
                        <div key={field.label} className={field.type === 'textarea' ? 'md:col-span-2' : ''}>
                          <FieldCard field={field} />
                        </div>
                      ))}
                    </div>

                    <div className="mt-8 flex flex-col gap-4 border-t border-slate-200 pt-6 sm:flex-row sm:justify-between">
                      <button
                        onClick={() => setCurrentStep((value) => Math.max(value - 1, 0))}
                        className="rounded-2xl border border-slate-200 px-5 py-3 text-sm font-semibold text-slate-600 transition hover:bg-slate-50"
                      >
                        Etapa anterior
                      </button>
                      <div className="flex gap-3">
                        <button className="rounded-2xl border border-seeBlue/15 px-5 py-3 text-sm font-semibold text-seeBlue transition hover:bg-seeBlueSoft">
                          Salvar rascunho
                        </button>
                        <button
                          onClick={() => setCurrentStep((value) => Math.min(value + 1, steps.length - 1))}
                          className="rounded-2xl bg-seeGreen px-5 py-3 text-sm font-semibold text-white transition hover:bg-emerald-700"
                        >
                          Próxima etapa
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
              </section>

              <section id="historico" className="mx-auto max-w-7xl px-4 py-4 sm:px-6 lg:px-8">

                  <div className="rounded-[2rem] border border-slate-200 bg-white p-6 shadow-soft lg:p-8">

                      <div>
                        <p className="text-sm font-semibold uppercase tracking-[0.28em] text-seeGreen">Meus processos seletivos</p>
                        <h3 className="mt-2 text-3xl font-semibold text-seeBlue">Acompanhamento de status</h3>
                      </div>
                      <div className="inline-flex rounded-full bg-seeBlueSoft px-4 py-2 text-sm font-medium text-seeBlue">Dados fictícios para demonstração</div>
                    </div>

                    <div className="mt-6 overflow-hidden rounded-3xl border border-slate-200">
                      <div className="overflow-x-auto">
                        <table className="min-w-full divide-y divide-slate-200 text-sm">
                          <thead className="bg-slate-50 text-left text-slate-500">
                            <tr>
                              <th className="px-5 py-4 font-semibold">Processo</th>
                              <th className="px-5 py-4 font-semibold">Inscrição</th>
                              <th className="px-5 py-4 font-semibold">Última atualização</th>
                              <th className="px-5 py-4 font-semibold">Status</th>
                              <th className="px-5 py-4 font-semibold">Ação</th>
                            </tr>
                          </thead>
                          <tbody className="divide-y divide-slate-100 bg-white">
                            {processHistory.map((item) => (
                              <tr key={item.code} className="hover:bg-slate-50/70">
                                <td className="px-5 py-4">
                                  <div className="font-medium text-slate-800">{item.name}</div>
                                  <div className="mt-1 text-xs text-slate-500">SEE-MG · Banco de Talentos</div>
                                </td>
                                <td className="px-5 py-4 font-medium text-slate-700">{item.code}</td>
                                <td className="px-5 py-4 text-slate-600">{item.date}</td>
                                <td className="px-5 py-4">
                                  <span className={`inline-flex rounded-full px-3 py-1 text-xs font-semibold ring-1 ${statusClasses[item.statusTone]}`}>
                                    {item.status}
                                  </span>
                                </td>
                                <td className="px-5 py-4">
                                  <button className="rounded-xl border border-seeBlue/10 px-3 py-2 font-semibold text-seeBlue transition hover:bg-seeBlueSoft">
                                    Ver detalhes
                                  </button>
                                </td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  </div>

                  <div className="rounded-[2rem] border border-slate-200 bg-white p-6 shadow-soft lg:p-8">
                    <div className="flex items-center justify-between">
                      <div>
                        <p className="text-sm font-semibold uppercase tracking-[0.28em] text-seeGreen">Comprovante</p>
                        <h3 className="mt-2 text-3xl font-semibold text-seeBlue">Prévia em PDF</h3>
                      </div>
                      <button className="rounded-2xl border border-seeBlue/15 px-4 py-3 text-sm font-semibold text-seeBlue transition hover:bg-seeBlueSoft">
                        Baixar PDF
                      </button>
                    </div>

                    <div className="mt-6 rounded-[2rem] bg-slate-100 p-4">
                      <div className="mx-auto rounded-[1.5rem] border border-slate-200 bg-white p-6 shadow-lg">
                        <div className="border-b border-slate-200 pb-5 text-center">
                          <div className="mx-auto flex h-14 w-14 items-center justify-center rounded-2xl bg-gradient-to-br from-seeBlue to-seeGreen text-lg font-bold text-white">MG</div>
                          <h4 className="mt-4 text-2xl font-bold tracking-wide text-seeBlue">BANCO DE TALENTOS SEE-MG</h4>
                          <p className="mt-2 text-sm uppercase tracking-[0.22em] text-slate-500">Comprovante de inscrição · prévia visual</p>
                        </div>
                        <div className="grid gap-4 border-b border-slate-200 py-5 text-sm md:grid-cols-2">
                          <div>
                            <div className="text-xs uppercase tracking-[0.2em] text-slate-400">Candidato(a)</div>
                            <div className="mt-1 font-semibold text-slate-800">Marina Almeida Ribeiro</div>
                          </div>
                          <div>
                            <div className="text-xs uppercase tracking-[0.2em] text-slate-400">Nº da inscrição</div>
                            <div className="mt-1 font-semibold text-slate-800">BT-2026-001284</div>
                          </div>
                          <div>
                            <div className="text-xs uppercase tracking-[0.2em] text-slate-400">Processo</div>
                            <div className="mt-1 font-semibold text-slate-800">Especialista em Projetos Educacionais</div>
                          </div>
                          <div>
                            <div className="text-xs uppercase tracking-[0.2em] text-slate-400">Data de emissão</div>
                            <div className="mt-1 font-semibold text-slate-800">18/03/2026 · 09:40</div>
                          </div>
                        </div>
                        <div className="py-5 text-sm leading-7 text-slate-600">
                          Declaro, para fins de demonstração desta interface, que o comprovante abaixo representa o formato previsto para futuras inscrições realizadas no Banco de Talentos SEE-MG.
                        </div>
                        <div className="rounded-2xl border border-dashed border-slate-300 bg-slate-50 p-4 text-xs uppercase tracking-[0.2em] text-slate-400">
                          Documento digital ilustrativo · sem validade oficial
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </section>

              <section className="mx-auto max-w-7xl px-4 py-16 sm:px-6 lg:px-8">
                <div className="overflow-hidden rounded-[2rem] border border-slate-200 bg-white shadow-soft">
                  <div className="grid lg:grid-cols-[0.42fr_0.58fr]">
                    <div className="bg-hero p-8 text-white lg:p-10">
                      <p className="text-sm font-semibold uppercase tracking-[0.28em] text-blue-100">Próximos desdobramentos</p>
                      <h3 className="mt-3 text-3xl font-semibold">Preparado para evolução futura</h3>
                      <p className="mt-4 text-sm leading-7 text-blue-50/90">
                        O protótipo foi estruturado para acomodar integração com autenticação, serviços de inscrição, área logada, filtros de vagas, notificações e geração real de documentos.
                      </p>
                    </div>
                    <div className="p-8 lg:p-10">
                      <div className="grid gap-4 md:grid-cols-2">
                        {[
                          ['Autenticação', 'Botão “Entrar com gov.br” configurado como placeholder visual para implementação futura.'],
                          ['Responsividade', 'Grid fluido, cartões adaptáveis e seções que reorganizam o conteúdo em telas menores.'],
                          ['Dados fictícios', 'Todos os textos, oportunidades e registros foram redigidos apenas para fins de apresentação.'],
                          ['Identidade visual', 'Linguagem visual genérica inspirada em portais públicos, sem uso de marcas oficiais.'],
                        ].map(([title, text]) => (
                          <div key={title} className="rounded-3xl border border-slate-200 bg-slate-50 p-5">
                            <div className="text-base font-semibold text-seeBlue">{title}</div>
                            <p className="mt-2 text-sm leading-7 text-slate-600">{text}</p>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                </div>
              </section>
            </main>
          </div>
        );
      };

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
